<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Graduation Scavenger Hunt</title>

<style>
body { font-family: Arial; margin:0; padding:0; background:#f5f8fb; }
main { max-width:600px; margin:auto; padding:20px; }
.card { background:#fff; padding:20px; border-radius:16px; margin-bottom:15px; }
button { width:100%; padding:14px; margin-top:10px; border:none; border-radius:10px; background:#3d8fc5; color:#fff; font-weight:bold; }
button.danger { background:#e74c3c; }
.hidden { display:none; }
.hunt-item { padding:12px; border:1px solid #ddd; border-radius:10px; margin-bottom:8px; cursor:pointer; }
.hunt-item.done { background:#eafaf1; }
.small { font-size:12px; color:#666; }
img { width:100%; border-radius:10px; }
</style>

</head>
<body>

<main>

<div id="homePage" class="card">
<h2>Play Now!</h2>
<input id="name" placeholder="Enter name" />
<button onclick="join()">Start Playing</button>
</div>

<div id="huntPage" class="hidden">
<div class="card">
<strong id="welcome"></strong>
<div id="progress"></div>
</div>

<div id="huntList"></div>

<button onclick="showGallery()">View Photos</button>
</div>

<div id="galleryPage" class="hidden">
<h2>Photos</h2>
<div id="gallery"></div>
<button onclick="showHunt()">Back</button>
</div>

</main>

<input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden"/>
<input id="uploadInput" type="file" accept="image/*" class="hidden"/>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const challenges = ["Jadyn smiling","Selfie","Food table","Group photo"];

let player = null;
let photos = [];

function join(){
  const name = document.getElementById("name").value;
  if(!name) return alert("Enter name");

  const id = Date.now().toString();
  player = { id, name, completed:[] };

  set(ref(db,"players/"+id), player);

  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("huntPage").classList.remove("hidden");
  document.getElementById("welcome").innerText = "Welcome "+name;

  render();
}

function render(){
  const list = document.getElementById("huntList");
  list.innerHTML="";

  challenges.forEach((c,i)=>{
    const done = player.completed.includes(i);

    const div = document.createElement("div");
    div.className = "hunt-item "+(done?"done":"");
    div.innerHTML = `<b>${c}</b><div class="small">${done?"Done":"Tap to upload"}</div>`;

    div.onclick = ()=>selectPhoto(i);

    const myPhotos = photos.filter(p=>p.playerId===player.id && p.challenge===i);

    myPhotos.forEach(p=>{
      const btn = document.createElement("button");
      btn.className="danger";
      btn.innerText="Delete Photo";
      btn.onclick = (e)=>{
        e.stopPropagation();
        deletePhoto(p);
      };
      div.appendChild(btn);
    });

    list.appendChild(div);
  });

  document.getElementById("progress").innerText =
    player.completed.length + "/" + challenges.length;
}

function selectPhoto(i){
  currentChallenge=i;

  if(confirm("Take photo? OK = camera, Cancel = upload")){
    document.getElementById("cameraInput").click();
  } else {
    document.getElementById("uploadInput").click();
  }
}

let currentChallenge=null;

document.getElementById("cameraInput").onchange = e=>upload(e.target.files[0]);
document.getElementById("uploadInput").onchange = e=>upload(e.target.files[0]);

async function upload(file){
  const path = "photos/"+Date.now()+file.name;
  const refStorage = sRef(storage,path);

  await uploadBytes(refStorage,file);
  const url = await getDownloadURL(refStorage);

  const newRef = push(ref(db,"photos"));
  await set(newRef,{
    playerId:player.id,
    playerName:player.name,
    challenge:currentChallenge,
    url,
    path
  });

  if(!player.completed.includes(currentChallenge)){
    player.completed.push(currentChallenge);
    update(ref(db,"players/"+player.id),{completed:player.completed});
  }
}

function deletePhoto(p){
  deleteObject(sRef(storage,p.path));
  remove(ref(db,"photos/"+p.id));
}

onValue(ref(db,"photos"),snap=>{
  const val = snap.val()||{};
  photos = Object.entries(val).map(([id,v])=>({id,...v}));
  renderGallery();
  if(player) render();
});

function renderGallery(){
  const g = document.getElementById("gallery");
  g.innerHTML="";
  photos.forEach(p=>{
    const div=document.createElement("div");
    div.innerHTML=`<img src="${p.url}"><div>${p.playerName}</div>`;
    g.appendChild(div);
  });
}

function showGallery(){
  document.getElementById("huntPage").classList.add("hidden");
  document.getElementById("galleryPage").classList.remove("hidden");
}

function showHunt(){
  document.getElementById("galleryPage").classList.add("hidden");
  document.getElementById("huntPage").classList.remove("hidden");
}

</script>

</body>
</html>

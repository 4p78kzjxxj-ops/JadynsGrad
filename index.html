<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Graduation Scavenger Hunt</title>

<style>
:root{
  --blue:#0a2cff;
  --gold:#ffd400;
  --bg:#f4f7ff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
}

main{
  max-width:600px;
  margin:auto;
  padding:20px;
}

/* Logo */
.logo{
  text-align:center;
  margin-bottom:10px;
}
.logo img{width:120px;}

/* Watermark */
.watermark{
  position:fixed;
  bottom:80px;
  right:20px;
  width:90px;
  opacity:.08;
  pointer-events:none;
}

/* Card */
.card{
  background:white;
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
  border:2px solid var(--blue);
}

/* Button */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--blue);
  color:white;
  font-weight:bold;
  margin-top:10px;
}

button.secondary{
  background:#eee;
  color:#000;
}

button.danger{
  background:#ff3b30;
}

/* Hunt */
.hunt-item{
  padding:12px;
  border:2px solid var(--blue);
  border-radius:12px;
  margin-bottom:10px;
}

.hunt-item.done{
  background:#fff4b3;
}

/* Gallery */
#gallery{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

img{
  width:100%;
  border-radius:10px;
}

.hidden{display:none}

/* Lightbox */
#lightbox{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#lightbox img{
  max-width:90%;
  max-height:90%;
}

#lightbox button{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  background:none;
}

#lightbox .left{left:10px;}
#lightbox .right{right:10px;}

/* Bottom Nav */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
}

.nav button{
  flex:1;
  margin:0;
}
</style>
</head>

<body>

<img src="logo.png" class="watermark">

<main>

<div class="logo">
<img src="logo.png">
</div>

<div id="home" class="card">
<h2>Play Now</h2>
<input id="name" placeholder="Enter name">
<button onclick="join()">Start Playing</button>
</div>

<div id="hunt" class="hidden">
<div class="card">
<div id="welcome"></div>
<div id="progress"></div>
</div>

<div id="list"></div>
</div>

<div id="photos" class="hidden">
<h2>Photos</h2>
<div id="gallery"></div>
</div>

</main>

<div class="nav hidden" id="nav">
<button onclick="showHunt()">Hunt</button>
<button onclick="showPhotos()">Photos</button>
</div>

<div id="lightbox" class="hidden">
<button class="left" onclick="prev()">‹</button>
<img id="lightImg">
<button class="right" onclick="next()">›</button>
</div>

<input id="cam" type="file" accept="image/*" capture="environment" class="hidden">
<input id="upload" type="file" accept="image/*" class="hidden">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCAz2tKoSLs1aFhHGvwF0juNYp6BOJ69ZI",
  authDomain: "jadyngrad-975d6.firebaseapp.com",
  databaseURL: "https://jadyngrad-975d6-default-rtdb.firebaseio.com",
  projectId: "jadyngrad-975d6",
  storageBucket: "jadyngrad-975d6.firebasestorage.app",
  messagingSenderId: "802057331885",
  appId: "1:802057331885:web:18708dd1307c5d997a9224"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const challenges = ["Jadyn smiling","Selfie","Food table","Group photo"];

let player=null;
let photos=[];
let current=null;
let index=0;

function join(){
  const name=document.getElementById("name").value;
  if(!name) return alert("Enter name");

  const id=Date.now().toString();
  player={id,name,completed:[]};

  set(ref(db,"players/"+id),player);

  document.getElementById("home").classList.add("hidden");
  document.getElementById("hunt").classList.remove("hidden");
  document.getElementById("nav").classList.remove("hidden");

  document.getElementById("welcome").innerText=name;
  render();
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  challenges.forEach((c,i)=>{
    const done=player.completed.includes(i);

    const div=document.createElement("div");
    div.className="hunt-item "+(done?"done":"");
    div.innerHTML=c;

    div.onclick=()=>choose(i);

    const mine=photos.filter(p=>p.playerId===player.id && p.challenge===i);

    mine.forEach(p=>{
      const btn=document.createElement("button");
      btn.innerText="Delete";
      btn.className="danger";
      btn.onclick=(e)=>{e.stopPropagation();del(p)};
      div.appendChild(btn);
    });

    list.appendChild(div);
  });

  document.getElementById("progress").innerText=
    player.completed.length+"/"+challenges.length;
}

function choose(i){
  current=i;
  if(confirm("OK = camera, Cancel = upload")){
    document.getElementById("cam").click();
  }else{
    document.getElementById("upload").click();
  }
}

document.getElementById("cam").onchange=e=>upload(e.target.files[0]);
document.getElementById("upload").onchange=e=>upload(e.target.files[0]);

async function upload(file){
  const path="photos/"+Date.now();
  const refS=sRef(storage,path);

  await uploadBytes(refS,file);
  const url=await getDownloadURL(refS);

  const newRef=push(ref(db,"photos"));
  set(newRef,{
    playerId:player.id,
    playerName:player.name,
    challenge:current,
    url,
    path
  });

  if(!player.completed.includes(current)){
    player.completed.push(current);
    update(ref(db,"players/"+player.id),{completed:player.completed});
  }
}

function del(p){
  deleteObject(sRef(storage,p.path));
  remove(ref(db,"photos/"+p.id));
}

onValue(ref(db,"photos"),snap=>{
  const val=snap.val()||{};
  photos=Object.entries(val).map(([id,v])=>({id,...v}));
  renderGallery();
  if(player) render();
});

function renderGallery(){
  const g=document.getElementById("gallery");
  g.innerHTML="";
  photos.forEach((p,i)=>{
    const d=document.createElement("div");
    d.innerHTML=`<img src="${p.url}" onclick="open(${i})">`;
    g.appendChild(d);
  });
}

function showHunt(){
  document.getElementById("photos").classList.add("hidden");
  document.getElementById("hunt").classList.remove("hidden");
}

function showPhotos(){
  document.getElementById("hunt").classList.add("hidden");
  document.getElementById("photos").classList.remove("hidden");
}

window.open=function(i){
  index=i;
  document.getElementById("lightbox").classList.remove("hidden");
  document.getElementById("lightImg").src=photos[index].url;
}

window.next=function(){
  index=(index+1)%photos.length;
  document.getElementById("lightImg").src=photos[index].url;
}

window.prev=function(){
  index=(index-1+photos.length)%photos.length;
  document.getElementById("lightImg").src=photos[index].url;
}

document.getElementById("lightbox").onclick=()=>{
  document.getElementById("lightbox").classList.add("hidden");
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin</title>

<style>
:root{
 --blue:#0a2cff;
 --blue-dark:#03117a;
 --gold:#ffd400;
 --bg:#f4f7ff;
 --card:#ffffff;
 --text:#111827;
 --muted:#6b7280;
 --danger:#ef4444;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Arial, sans-serif;
 background:linear-gradient(180deg,#ffffff,#f4f7ff);
 color:var(--text);
}

main{
 max-width:620px;
 margin:auto;
 padding:18px 16px 90px;
}

.logo{
 text-align:center;
 margin:8px 0 10px;
}

.logo img{
 width:125px;
 max-width:38vw;
}

.watermark{
 position:fixed;
 right:18px;
 bottom:82px;
 width:90px;
 opacity:.08;
 pointer-events:none;
}

.hero{
 text-align:center;
 margin-bottom:16px;
}

.hero h1{
 margin:8px 0 6px;
 color:var(--blue-dark);
 font-size:38px;
 line-height:1;
}

.hero h1 span{
 color:var(--blue);
}

.hero p{
 margin:0;
 color:var(--muted);
 font-size:14px;
}

.card{
 background:var(--card);
 border:2px solid var(--blue);
 border-radius:22px;
 padding:18px;
 margin-bottom:16px;
 box-shadow:0 12px 28px rgba(10,44,255,.12);
}

button{
 width:100%;
 padding:14px;
 border:0;
 border-radius:14px;
 margin-top:10px;
 background:var(--blue);
 color:white;
 font-weight:bold;
 font-size:16px;
 cursor:pointer;
}

button.danger{
 background:var(--danger);
 color:white;
}

.notice{
 background:#fff7bf;
 border:1px solid var(--gold);
 color:#4b3d00;
 border-radius:16px;
 padding:12px;
 margin-bottom:14px;
 font-size:14px;
}

.status{
 margin-top:12px;
 color:var(--muted);
 font-size:14px;
 text-align:center;
}
</style>
</head>

<body>

<img src="logo.png" class="watermark" alt="Logo">

<main>

 <div class="logo">
  <img src="logo.png" alt="Logo">
 </div>

 <div class="hero">
  <h1>Admin <span>Page</span></h1>
  <p>Clear the scavenger hunt data.</p>
 </div>

 <section class="card">
  <div class="notice">
   This will remove all players and all photo records. It will also try to delete uploaded photos from Firebase Storage.
  </div>

  <button id="clearEverythingBtn" class="danger">Clear Everything</button>
  <div id="status" class="status"></div>
 </section>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, remove, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
import { getStorage, ref as storageRef, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

const firebaseConfig = {
 apiKey: "AIzaSyCAz2tKoSLs1aFhHGvwF0juNYp6BOJ69ZI",
 authDomain: "jadyngrad-975d6.firebaseapp.com",
 databaseURL: "https://jadyngrad-975d6-default-rtdb.firebaseio.com",
 projectId: "jadyngrad-975d6",
 storageBucket: "jadyngrad-975d6.firebasestorage.app",
 messagingSenderId: "802057331885",
 appId: "1:802057331885:web:18708dd1307c5d997a9224"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const clearEverythingBtn = document.getElementById("clearEverythingBtn");
const statusBox = document.getElementById("status");

clearEverythingBtn.addEventListener("click", clearEverything);

async function clearEverything() {
 const yes = confirm("This will permanently clear all players and photos. Continue?");
 if (!yes) return;

 const typed = prompt('Type CLEAR to confirm.');
 if (typed !== "CLEAR") {
  statusBox.innerText = "Cancelled.";
  return;
 }

 clearEverythingBtn.disabled = true;
 clearEverythingBtn.innerText = "Clearing...";
 statusBox.innerText = "Deleting photos...";

 try {
  const photoSnap = await get(ref(db, "photos"));
  const photos = photoSnap.val() || {};

  for (const id in photos) {
   const photo = photos[id];

   if (photo && photo.path) {
    try {
     await deleteObject(storageRef(storage, photo.path));
    } catch (err) {
     console.warn("Storage delete failed:", err);
    }
   }
  }

  statusBox.innerText = "Clearing database...";

  await remove(ref(db, "photos"));
  await remove(ref(db, "players"));

  statusBox.innerText = "Everything cleared.";

 } catch (err) {
  console.error(err);
  statusBox.innerText = "Clear failed. Check Firebase rules.";
  alert("Clear failed. Check Firebase rules.");
 } finally {
  clearEverythingBtn.disabled = false;
  clearEverythingBtn.innerText = "Clear Everything";
 }
}
</script>

</body>
</html>

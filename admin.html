<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scavenger Hunt Admin</title>

<style>
:root{
 --blue:#0a2cff;
 --blue-dark:#03117a;
 --gold:#ffd400;
 --bg:#f4f7ff;
 --card:#ffffff;
 --text:#111827;
 --muted:#6b7280;
 --danger:#ef4444;
 --success:#22c55e;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Arial, sans-serif;
 background:linear-gradient(180deg,#ffffff,#f4f7ff);
 color:var(--text);
}

main{
 max-width:720px;
 margin:auto;
 padding:18px 16px 40px;
}

.logo{
 text-align:center;
 margin:8px 0 10px;
}

.logo img{
 width:125px;
 max-width:38vw;
}

.hero{
 text-align:center;
 margin-bottom:16px;
}

.hero h1{
 margin:8px 0 6px;
 color:var(--blue-dark);
 font-size:34px;
 line-height:1;
}

.hero h1 span{
 color:var(--blue);
}

.hero p{
 margin:0;
 color:var(--muted);
 font-size:14px;
}

.card{
 background:var(--card);
 border:2px solid var(--blue);
 border-radius:22px;
 padding:18px;
 margin-bottom:16px;
 box-shadow:0 12px 28px rgba(10,44,255,.12);
}

button{
 width:100%;
 padding:14px;
 border:0;
 border-radius:14px;
 margin-top:10px;
 background:var(--blue);
 color:white;
 font-weight:bold;
 font-size:16px;
 cursor:pointer;
}

button.danger{
 background:#fee2e2;
 color:#b91c1c;
}

button.real-danger{
 background:var(--danger);
 color:white;
}

.stats{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
}

.stat{
 background:#eef2ff;
 border-radius:18px;
 padding:14px;
 text-align:center;
}

.stat strong{
 display:block;
 font-size:30px;
 color:var(--blue-dark);
}

.stat span{
 color:var(--muted);
 font-size:13px;
}

.section-title{
 margin:4px 0 12px;
 color:var(--blue-dark);
}

.list{
 display:grid;
 gap:10px;
}

.row{
 background:white;
 border:1px solid #dbe3ff;
 border-radius:16px;
 padding:12px;
}

.row strong{
 color:var(--blue-dark);
}

.row small{
 color:var(--muted);
}

.photo-grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
}

.photo-card{
 background:white;
 border-radius:18px;
 overflow:hidden;
 border:1px solid #dbe3ff;
 box-shadow:0 8px 18px rgba(0,0,0,.06);
}

.photo-card img{
 width:100%;
 aspect-ratio:1/1;
 object-fit:cover;
 display:block;
}

.photo-meta{
 padding:9px;
 font-size:12px;
}

.empty{
 text-align:center;
 color:var(--muted);
 padding:24px;
 background:white;
 border-radius:18px;
 border:1px solid #dbe3ff;
}

.warning{
 background:#fff7bf;
 border:1px solid var(--gold);
 color:#4b3d00;
 border-radius:16px;
 padding:12px;
 margin-top:10px;
 font-size:14px;
}

.status{
 margin-top:10px;
 font-size:14px;
 color:var(--muted);
}
</style>
</head>

<body>

<main>

 <div class="logo">
  <img src="logo.png" alt="Logo">
 </div>

 <div class="hero">
  <h1>Admin <span>Dashboard</span></h1>
  <p>Manage Jadyn’s Graduation Scavenger Hunt.</p>
 </div>

 <section class="card">
  <div class="stats">
   <div class="stat">
    <strong id="playerCount">0</strong>
    <span>Players</span>
   </div>
   <div class="stat">
    <strong id="photoCount">0</strong>
    <span>Photos</span>
   </div>
  </div>

  <div class="warning">
   <strong>Clear Everything</strong><br>
   This removes all players and all photo records. It will also try to delete uploaded photos from Firebase Storage.
  </div>

  <button id="clearEverythingBtn" class="real-danger">Clear Everything</button>
  <div id="status" class="status"></div>
 </section>

 <section class="card">
  <h2 class="section-title">Players</h2>
  <div id="playersList" class="list"></div>
 </section>

 <section class="card">
  <h2 class="section-title">Photos</h2>
  <div id="photosList" class="photo-grid"></div>
 </section>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
import { getStorage, ref as storageRef, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

const firebaseConfig = {
 apiKey: "AIzaSyCAz2tKoSLs1aFhHGvwF0juNYp6BOJ69ZI",
 authDomain: "jadyngrad-975d6.firebaseapp.com",
 databaseURL: "https://jadyngrad-975d6-default-rtdb.firebaseio.com",
 projectId: "jadyngrad-975d6",
 storageBucket: "jadyngrad-975d6.firebasestorage.app",
 messagingSenderId: "802057331885",
 appId: "1:802057331885:web:18708dd1307c5d997a9224"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let players = {};
let photos = {};

const playerCount = document.getElementById("playerCount");
const photoCount = document.getElementById("photoCount");
const playersList = document.getElementById("playersList");
const photosList = document.getElementById("photosList");
const statusBox = document.getElementById("status");
const clearEverythingBtn = document.getElementById("clearEverythingBtn");

onValue(ref(db, "players"), snap => {
 players = snap.val() || {};
 renderPlayers();
 renderCounts();
});

onValue(ref(db, "photos"), snap => {
 photos = snap.val() || {};
 renderPhotos();
 renderCounts();
});

clearEverythingBtn.addEventListener("click", clearEverything);

function renderCounts() {
 playerCount.innerText = Object.keys(players).length;
 photoCount.innerText = Object.keys(photos).length;
}

function renderPlayers() {
 playersList.innerHTML = "";

 const entries = Object.entries(players);

 if (!entries.length) {
  playersList.innerHTML = `<div class="empty">No players yet.</div>`;
  return;
 }

 entries
  .sort((a, b) => String(a[1].name || "").localeCompare(String(b[1].name || "")))
  .forEach(([id, p]) => {
   const completed = Array.isArray(p.completed) ? p.completed.length : 0;

   const div = document.createElement("div");
   div.className = "row";
   div.innerHTML = `
    <strong>${escapeHtml(p.name || "Unknown Player")}</strong><br>
    <small>Completed: ${completed}</small><br>
    <small>ID: ${escapeHtml(id)}</small>
   `;
   playersList.appendChild(div);
  });
}

function renderPhotos() {
 photosList.innerHTML = "";

 const entries = Object.entries(photos);

 if (!entries.length) {
  photosList.innerHTML = `<div class="empty">No photos yet.</div>`;
  return;
 }

 entries
  .sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0))
  .forEach(([id, p]) => {
   const div = document.createElement("div");
   div.className = "photo-card";
   div.innerHTML = `
    <img src="${escapeHtml(p.url || "")}" alt="Photo">
    <div class="photo-meta">
     <strong>${escapeHtml(p.playerName || "Guest")}</strong><br>
     ${escapeHtml(p.challengeText || "Photo")}<br>
     <small>ID: ${escapeHtml(id)}</small>
    </div>
   `;
   photosList.appendChild(div);
  });
}

async function clearEverything() {
 const firstConfirm = confirm("Are you sure you want to clear EVERYTHING? This removes all players and photos.");
 if (!firstConfirm) return;

 const typed = prompt('Type CLEAR to confirm.');
 if (typed !== "CLEAR") {
  statusBox.innerText = "Clear cancelled.";
  return;
 }

 clearEverythingBtn.disabled = true;
 clearEverythingBtn.innerText = "Clearing...";
 statusBox.innerText = "Deleting uploaded photos...";

 try {
  const photoSnap = await get(ref(db, "photos"));
  const currentPhotos = photoSnap.val() || {};
  const photoEntries = Object.entries(currentPhotos);

  for (const [id, photo] of photoEntries) {
   if (photo.path) {
    try {
     await deleteObject(storageRef(storage, photo.path));
    } catch (err) {
     console.warn("Could not delete storage photo:", id, err);
    }
   }
  }

  statusBox.innerText = "Removing database records...";

  await remove(ref(db, "photos"));
  await remove(ref(db, "players"));

  statusBox.innerText = "Everything cleared successfully.";

 } catch (err) {
  console.error(err);
  statusBox.innerText = "Clear failed. Check Firebase permissions/rules.";
  alert("Clear failed. Check Firebase permissions/rules.");
 } finally {
  clearEverythingBtn.disabled = false;
  clearEverythingBtn.innerText = "Clear Everything";
 }
}

function escapeHtml(value) {
 return String(value)
  .replaceAll("&", "&amp;")
  .replaceAll("<", "&lt;")
  .replaceAll(">", "&gt;")
  .replaceAll('"', "&quot;")
  .replaceAll("'", "&#039;");
}
</script>

</body>
</html>

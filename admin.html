<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
body{font-family:Arial; padding:20px;}
button{padding:10px; margin:5px;}
.danger{background:red;color:white;}
</style>
</head>

<body>

<h2>Admin Panel</h2>

<button onclick="downloadAllPhotos()">Download All Photos</button>
<button class="danger" onclick="deleteAll()">Delete Everything</button>

<h3>Photos</h3>
<div id="photos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
import { getStorage, ref as sRef, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let photos=[];

onValue(ref(db,"photos"),snap=>{
  const val=snap.val()||{};
  photos = Object.entries(val).map(([id,v])=>({id,...v}));
  render();
});

function render(){
  const div=document.getElementById("photos");
  div.innerHTML="";
  photos.forEach(p=>{
    const el=document.createElement("div");
    el.innerHTML=`
      <img src="${p.url}" width="100">
      <button onclick="del('${p.id}','${p.path}')">Delete</button>
    `;
    div.appendChild(el);
  });
}

window.del = function(id,path){
  deleteObject(sRef(storage,path));
  remove(ref(db,"photos/"+id));
}

window.deleteAll = function(){
  if(!confirm("Delete EVERYTHING?")) return;

  photos.forEach(p=>{
    deleteObject(sRef(storage,p.path));
  });

  remove(ref(db,"photos"));
  remove(ref(db,"players"));
}

window.downloadAllPhotos = async function(){
  if(!photos.length){
    alert("No photos to download.");
    return;
  }

  const zip = new JSZip();
  const folder = zip.folder("graduation-photos");

  for(let i=0; i<photos.length; i++){
    const p = photos[i];

    try {
      const response = await fetch(p.url);
      const blob = await response.blob();

      const safeName = `${i+1}-${p.playerName || "guest"}-${p.challenge || "photo"}.jpg`
        .replace(/[^a-z0-9.-]/gi, "_");

      folder.file(safeName, blob);
    } catch(e) {
      console.error("Failed to download photo:", p, e);
    }
  }

  const zipBlob = await zip.generateAsync({type:"blob"});

  const link = document.createElement("a");
  link.href = URL.createObjectURL(zipBlob);
  link.download = "graduation-photos.zip";
  link.click();

  URL.revokeObjectURL(link.href);
}

</script>

</body>
</html>
